name: DiskSpaceFinder
options:
  bundleIdPrefix: com.diskspacefinder
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

targets:
  DiskSpaceFinder:
    type: application
    platform: macOS
    sources:
      - Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.diskspacefinder.app
        INFOPLIST_FILE: Sources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/DiskSpaceFinder.entitlements
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SWIFT_VERSION: "5.9"
        PRODUCT_NAME: DiskSpaceFinder
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        # App Store Settings
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_STYLE: Automatic
        # Privacy
        NSDesktopFolderUsageDescription: "Disk Space Finder needs access to scan your Desktop folder for disk usage analysis."
        NSDocumentsFolderUsageDescription: "Disk Space Finder needs access to scan your Documents folder for disk usage analysis."
        NSDownloadsFolderUsageDescription: "Disk Space Finder needs access to scan your Downloads folder for disk usage analysis."
        NSRemovableVolumesUsageDescription: "Disk Space Finder needs access to scan removable volumes for disk usage analysis."
        NSNetworkVolumesUsageDescription: "Disk Space Finder needs access to scan network volumes for disk usage analysis."

  DiskSpaceFinderTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/UnitTests
      - Tests/IntegrationTests
    dependencies:
      - target: DiskSpaceFinder
    settings:
      base:
        SWIFT_VERSION: "5.9"
        PRODUCT_BUNDLE_IDENTIFIER: com.diskspacefinder.tests
        GENERATE_INFOPLIST_FILE: YES

  DiskSpaceFinderUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - Tests/UITests
    dependencies:
      - target: DiskSpaceFinder
    settings:
      base:
        SWIFT_VERSION: "5.9"
        PRODUCT_BUNDLE_IDENTIFIER: com.diskspacefinder.uitests
        GENERATE_INFOPLIST_FILE: YES
